name: Rust Build and Release

on:
  push:
    tags:
      - 'v*' 
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Main Binary (DisplayFlow)
        run: cargo build --release

      - name: Bundle Suite
        shell: pwsh
        run: |
          # Verzeichnis erstellen
          New-Item -ItemType Directory -Force -Path ./publish
          
          # Haupt-Binary kopieren (Name korrigiert auf displayflowcli.exe)
          Copy-Item "target/release/displayflowcli.exe" -Destination "./publish/"
          
          # Optionale Dateien prüfen und kopieren
          if (Test-Path "screen_animation.exe") { 
            Copy-Item "screen_animation.exe" -Destination "./publish/" 
          }
          if (Test-Path "DF.ico") { 
            Copy-Item "DF.ico" -Destination "./publish/" 
          }
          if (Test-Path "sounds") {
            Copy-Item -Path "sounds" -Destination "./publish/" -Recurse
          }
          
          # ZIP-Archiv erstellen
          Compress-Archive -Path ./publish/* -DestinationPath ./displayflow.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: displayflow.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}