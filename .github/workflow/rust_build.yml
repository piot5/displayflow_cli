name: Rust Build and Release

on:
  push:
    branches: [ "main" ] # Startet den Build bei jedem Push auf Main
  workflow_dispatch:      # Ermöglicht manuellen Start über das GitHub UI

jobs:
  build:
    name: Build Windows Binary
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build Release
        # Hier wird das Secret aus GitHub in die Umgebung injiziert
        env:
          SB_API_KEY: ${{ secrets.SB_API_KEY }}
        run: cargo build --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DisplayFlow-exe
          path: target/release/displayflow.exe